# Deploy GrooveGraph static UI to Azure Static Web Apps (swa-groovegraph).
# Trigger: push to main. Requires GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN
# (get token: az staticwebapp secrets list --name swa-groovegraph --resource-group rg-groovegraph --query "properties.apiKey" -o tsv)

name: Deploy to Azure Static Web Apps (swa-groovegraph)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_BASE_URL: https://as-groovegraph-api.azurewebsites.net

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export for SWA
        run: npm run build:static:swa
        env:
          NEXT_STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          output_location: ""
          skip_app_build: true
